{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
    <link rel="icon" href="data:,">
{% endblock %}

{% block content %}
<section class="hero-section">
    <header class="main-header container">
        <div class="brand-wrapper">
            <p class="subtitle">Fast & Tasty Delivery</p>
            <h1 class="main-title">Bip<span>Flow</span></h1>
        </div>

        <button id="menu-toggle" class="menu-btn" aria-label="Abrir filtros">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <aside id="filters-sidebar" class="filters-sidebar">
        <div class="sidebar-header">
            <h2 class="filters-sidebar__title">Filtros</h2>
            <button id="close-sidebar" class="close-btn" aria-label="Fechar filtros">&times;</button>
        </div>
        
        <form id="filters-form" class="filters-sidebar__form">
            <div class="filter-group">
                <h3>Categorias</h3>
                <label class="filters-sidebar__option">
                    <input type="checkbox" name="category" value="pizza"> Pizza
                </label>
                <label class="filters-sidebar__option">
                    <input type="checkbox" name="category" value="hamburguer"> Hambúrguer
                </label>
                <label class="filters-sidebar__option">
                    <input type="checkbox" name="category" value="salada"> Salada
                </label>
            </div>
            <button type="submit" class="filters-sidebar__apply">Aplicar Filtros</button>
        </form>
    </aside>
</section>

<main class="content-wrapper container">
    <div id="produtos-container" class="product-grid">
        <div class="loading-state">
            <p>Preparando seu cardápio...</p>
        </div>
    </div>
</main>

{% include 'partials/_cart.html' %}

<div id="sidebar-overlay" class="overlay"></div>

{% endblock %}
