{% extends "base.html" %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/pages/home.css' %}">
{% endblock %}

{% block content %}
<section class="hero-section">
    <header class="main-header container">
        <div class="brand-wrapper">
            <p class="subtitle">Fast &amp; Tasty Delivery</p>
            <h1 class="main-title">Bip<span>Flow</span></h1>
        </div>

        <nav class="categories-nav" aria-label="Filtro de categorias">
            <div id="categories-container"></div>
        </nav>
    </header>

    <button class="menu-toggle" aria-label="Abrir filtros">
        <i class="fas fa-filter"></i> <span>Filtros</span>
    </button>

    <aside class="filters-sidebar" aria-label="Filtros de comida">
        <div class="sidebar-header">
            <h2 class="filters-sidebar__title">Filtrar Cardápio</h2>
        </div>
        
        <form class="filters-sidebar__form">
            <label class="filters-sidebar__option">
                <input type="checkbox" name="category" value="pizza" class="filter-checkbox"> Pizza
            </label>
            <label class="filters-sidebar__option">
                <input type="checkbox" name="category" value="hamburguer" class="filter-checkbox"> Hambúrguer
            </label>
            <label class="filters-sidebar__option">
                <input type="checkbox" name="category" value="salada" class="filter-checkbox"> Salada
            </label>
            <label class="filters-sidebar__option">
                <input type="checkbox" name="category" value="sobremesa" class="filter-checkbox"> Sobremesa
            </label>

            <button type="submit" class="filters-sidebar__apply">Aplicar Filtros</button>
        </form>
    </aside>
</section>

<div id="overlay" class="overlay-blur"></div>

<main class="content-wrapper container">
    <div id="produtos-container" class="product-grid">
        <div class="loading-state">
            <div class="skeleton-loader"></div>
            <p>Buscando os melhores sabores...</p>
        </div>
    </div>
</main>

{% include "partials/_cart.html" %}
{% endblock %}
