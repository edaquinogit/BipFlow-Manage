<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BipDelivery - Os melhores hambúrgueres e pastéis com entrega rápida.">
    <meta name="theme-color" content="#830404">
    
    <title>BipDelivery | Menu de Elite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="brand-wrapper">
                <h1 class="main-title">Bip<span>Delivery</span></h1>
                <div class="status-badge">
                    <span class="dot pulse"></span> Aberto agora
                </div>
            </div>
            <p class="subtitle">A experiência do verdadeiro delivery na sua porta.</p>
        </div>
    </header>

    <nav class="categories-nav container" aria-label="Categorias de produtos">
        <button class="cat-item active" data-category="todos">🔥 Todos</button>
        <button class="cat-item" data-category="hamburguer">🍔 Hambúrgueres</button>
        <button class="cat-item" data-category="pastel">🥟 Pastéis</button>
        <button class="cat-item" data-category="bebida">🥤 Bebidas</button>
    </nav>

    <main class="container">
        <section id="menu">
            <div id="produtos-container" class="produtos-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>
    </main>

    <button id="cart-icon" onclick="toggleCarrinho()" aria-label="Abrir carrinho de compras">
        <div class="cart-wrapper">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-count" class="badge">0</span>
        </div>
        <span class="cart-label">Ver Pedido</span>
    </button>

    <aside id="carrinho-modal" class="modal-carrinho">
        <div class="modal-header">
            <h2><i class="fa-solid fa-receipt"></i> Meu Pedido</h2>
            <button onclick="toggleCarrinho()" class="close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="itens-carrinho" class="modal-body">
            <div class="empty-cart-msg">Seu carrinho está vazio</div>
        </div>

        <footer class="modal-footer">
            <div class="price-summary">
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span class="value">R$ <span id="subtotal-valor">0,00</span></span>
                </div>
                <div class="summary-line">
                    <span>Taxa de Entrega</span>
                    <span class="value delivery-free">Grátis</span>
                </div>
                <div class="total-line">
                    <span>Total</span>
                    <span class="total-value">R$ <span id="total-valor">0,00</span></span>
                </div>
            </div>
            
            <button id="finalizar-pedido" class="btn-checkout" onclick="enviarWhatsApp()">
                <span>Finalizar pelo WhatsApp</span>
                <i class="fa-brands fa-whatsapp"></i>
            </button>
        </footer>
    </aside>

    <div id="overlay" class="overlay-blur" onclick="toggleCarrinho()"></div>

    <script src="script.js"></script>
</body>
</html>
