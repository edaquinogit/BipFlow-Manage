[pytest]
python_files = tests.py test_*.py *_tests.py
addopts = --nomigrations --reuse-db -v
testpaths = bipdelivery/tests
filterwarnings =
    ignore:pkg_resources is deprecated as an API\.:DeprecationWarning:rest_framework_simplejwt
    ignore:datetime\.datetime\.utcnow\(\) is deprecated and scheduled for removal.*:DeprecationWarning:rest_framework_simplejwt
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated and scheduled for removal.*:DeprecationWarning:rest_framework_simplejwt
