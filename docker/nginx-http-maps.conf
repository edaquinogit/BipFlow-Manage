# http{}-level directives shared by server blocks in this image. nginx's
# official base image includes /etc/nginx/conf.d/*.conf inside its http{}
# block, which is the only place `map` is legal -- it can't live inside a
# server{} block, hence this separate file instead of nginx-proxy-headers.conf.
#
# Why: the frontend container sits behind the VM's host Nginx, which
# terminates TLS and forwards to this container over plain HTTP while setting
# X-Forwarded-Proto: https (see deploy/nginx-vm.conf.example). Without this
# map, nginx-proxy-headers.conf's `X-Forwarded-Proto $scheme` would overwrite
# that with this container's own (always-http) connection scheme, breaking
# SECURE_PROXY_SSL_HEADER on every request the backend receives -- not just
# the healthcheck, real traffic too.
map $http_x_forwarded_proto $bipflow_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
