server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location /static/ {
        alias /static/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location /media/ {
        alias /media/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
