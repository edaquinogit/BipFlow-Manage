server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location /static/ {
        alias /static/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    # Only reachable when this image runs under the base docker-compose.yml
    # (dev), which mounts media_data here. Under docker-compose.prod.yml,
    # /media isn't mounted at all -- production forces R2 storage
    # (USE_R2_STORAGE, see bipdelivery/core/settings.py), so MEDIA_URL
    # points at the R2 domain and no app code ever generates a /media/...
    # URL there. Left in this shared config on purpose (harmless 404 in
    # prod, since alias points at an empty/missing dir) instead of removing
    # it, since removing it would break local media serving in dev.
    location /media/ {
        alias /media/;
        access_log off;
        expires 1h;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
