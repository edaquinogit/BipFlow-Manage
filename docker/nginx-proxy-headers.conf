proxy_http_version 1.1;
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# $bipflow_forwarded_proto (nginx-http-maps.conf) preserves the scheme set by
# an upstream TLS-terminating proxy instead of always reporting this
# container's own (plain-HTTP) connection scheme.
proxy_set_header X-Forwarded-Proto $bipflow_forwarded_proto;
