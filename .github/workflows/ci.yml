name: CI

# Safety net for the current behaviour. This pipeline must stay green before
# and during the multi-tenant evolution (see
# docs/architecture/multi-tenant-evolution.md). It exercises the canonical
# runtime only: the Django REST backend and the Vue 3 frontend.
#
# Single workflow on purpose: this used to be split across ci.yml and
# frontend-tests.yml, both running their own copy of frontend
# typecheck/lint/unit/build. Merged so that work only runs once per push/PR,
# and so "is CI green" is answered by one workflow run, not two.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python bipdelivery/manage.py check

      - name: Run test suite
        run: python -m pytest

  frontend:
    name: Frontend (Vue / typecheck / lint / unit / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bipflow-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bipflow-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit:run

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend (Cypress E2E)
    runs-on: ubuntu-latest
    needs: frontend
    env:
      # localhost, not 127.0.0.1, throughout: cypress.config.ts's baseUrl
      # is "http://localhost:5173" and isn't overridden here, so Cypress's
      # browser navigates via localhost regardless of what the backend/Vite
      # host env vars say. The refresh_token cookie is SameSite=Strict
      # (see cypress/support/commands.ts's own comment on this), and
      # browsers treat localhost and 127.0.0.1 as different sites -- with
      # VITE_API_URL pointing at 127.0.0.1 while the page itself loads from
      # localhost, every XHR to the API was cross-site, so the cookie set by
      # loginViaApi()'s cy.request() never made it onto the app's own
      # subsequent refresh call. That silently broke every authenticated
      # E2E test in this job (confirmed by reproducing it in an isolated
      # environment: switching every one of these values from 127.0.0.1 to
      # localhost took auth from failing 100% of the time to working).
      BASE_URL: http://localhost:8000
      BIPFLOW_THROTTLE_AUTH_IP: 1000/minute
      BIPFLOW_THROTTLE_AUTH_LOGIN_IDENTITY: 1000/minute
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      CYPRESS_adminPassword: ci-e2e-throwaway-pw-2026
      CYPRESS_adminUsername: admin@example.com
      CYPRESS_apiBaseUrl: http://localhost:8000/api
      CYPRESS_apiUrl: http://localhost:8000
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_DEBUG: "True"
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: ci-only-non-production-placeholder-key-for-frontend-e2e
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_BASE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:8000/api/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bipflow-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: bipflow-frontend

      - name: Prepare Django database
        run: |
          python bipdelivery/manage.py migrate --noinput
          python bipdelivery/manage.py seed_dashboard_roles --email admin@example.com --password ci-e2e-throwaway-pw-2026 --staff --role admin
          python bipdelivery/manage.py seed_e2e_demo_data

      - name: Start Django backend
        run: |
          python bipdelivery/manage.py runserver 127.0.0.1:8000 > django-e2e.log 2>&1 &
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(60):
              try:
                  urllib.request.urlopen("http://127.0.0.1:8000/api/v1/products/?page_size=1", timeout=2)
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Django backend did not become ready in time.")
          PY

      - name: Cypress tests
        run: npm run test:e2e:run
        working-directory: bipflow-frontend

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-diagnostics
          path: |
            django-e2e.log
            bipflow-frontend/cypress/screenshots
            bipflow-frontend/cypress/videos
          if-no-files-found: ignore

  docker-build:
    name: Docker build (Django image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: bipflow-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker build (Frontend image)
    # deploy.yml builds and pushes this same image straight to GHCR right
    # after CI goes green -- nothing else in CI ever built it, so a broken
    # docker/frontend.Dockerfile only surfaced at deploy time (see the
    # "fix broken frontend Docker build" commit). This job builds and boots
    # it here instead, so a bad frontend image fails the PR, not the deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          build-args: |
            VITE_API_URL=/api/
          push: false
          load: true
          tags: bipflow-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Smoke test frontend container
        run: |
          # frontend-nginx.conf proxy_passes to the "backend" hostname, and
          # nginx resolves upstream hostnames at startup -- with no such
          # host it refuses to boot at all ("host not found in upstream").
          # In docker-compose.prod.yml that name is the real backend
          # service; here a do-nothing placeholder on the same network is
          # enough to satisfy the DNS lookup so nginx can start.
          docker network create smoke-net
          docker run -d --name backend --network smoke-net alpine:3.20 sleep 3600
          docker run -d --name frontend-smoke --network smoke-net -p 8080:80 bipflow-frontend:ci
          for i in $(seq 1 10); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "frontend container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "frontend container never became healthy" >&2
          docker logs frontend-smoke
          exit 1

      - name: Stop smoke containers
        if: always()
        run: |
          docker rm -f frontend-smoke backend
          docker network rm smoke-net
