name: Frontend Tests

on:
  pull_request:
    paths:
      - ".github/workflows/frontend-tests.yml"
      - "bipflow-frontend/**"
      - "bipdelivery/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "requirements.txt"
  push:
    paths:
      - ".github/workflows/frontend-tests.yml"
      - "bipflow-frontend/**"
      - "bipdelivery/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-unit:
    name: Typecheck, Lint, Unit and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bipflow-frontend
    env:
      VITE_API_URL: http://127.0.0.1:8000/api/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bipflow-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit:run

      - name: Production build
        run: npm run build

  frontend-e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: frontend-unit
    env:
      BASE_URL: http://127.0.0.1:8000
      BIPFLOW_THROTTLE_AUTH_IP: 1000/minute
      BIPFLOW_THROTTLE_AUTH_LOGIN_IDENTITY: 1000/minute
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5173
      CYPRESS_adminPassword: admin123
      CYPRESS_adminUsername: admin@example.com
      CYPRESS_apiBaseUrl: http://127.0.0.1:8000/api
      CYPRESS_apiUrl: http://127.0.0.1:8000
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_DEBUG: "True"
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: django-insecure-ci-key-for-frontend-e2e
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_BASE_URL: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:8000/api/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bipflow-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: bipflow-frontend

      - name: Prepare Django database
        run: |
          python bipdelivery/manage.py migrate --noinput
          python bipdelivery/manage.py seed_dashboard_roles --email admin@example.com --password admin123 --staff --role admin

      - name: Start Django backend
        run: |
          python bipdelivery/manage.py runserver 127.0.0.1:8000 > django-e2e.log 2>&1 &
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(60):
              try:
                  urllib.request.urlopen("http://127.0.0.1:8000/api/v1/products/?page_size=1", timeout=2)
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Django backend did not become ready in time.")
          PY

      - name: Cypress tests
        run: npm run test:e2e:run
        working-directory: bipflow-frontend

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-diagnostics
          path: |
            django-e2e.log
            cypress/screenshots
            cypress/videos
            bipflow-frontend/cypress/screenshots
            bipflow-frontend/cypress/videos
          if-no-files-found: ignore
