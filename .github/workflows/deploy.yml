name: Deploy

# Manual only. Production today is Render (backend) + Cloudflare Pages
# (frontend) + R2 (media), which deploy themselves straight from GitHub --
# this VM path (SSH + docker-compose.prod.yml) isn't part of that anymore.
# It used to auto-run via workflow_run once CI went green on main, but with
# no VM behind DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY it just failed on
# every single push (every "deploy" job run failed at the SSH step -- see
# the Actions history). Kept as a manual trigger in case the VM path is
# ever needed again; delete this workflow (and docker-compose.prod.yml,
# deploy/nginx-vm.conf.example) outright if it's confirmed permanently
# retired instead.
on:
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.repo.outputs.backend_image }}
      frontend_image: ${{ steps.repo.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image names
        # GHCR (like all Docker registries) requires all-lowercase image
        # names; github.repository preserves the repo's actual case
        # (edaquinogit/BipFlow-Manage), which is not lowercase here.
        id: repo
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${repo_lower}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${repo_lower}/frontend" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.repo.outputs.backend_image }}:latest
            ${{ steps.repo.outputs.backend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          build-args: |
            VITE_API_URL=/api/
          push: true
          tags: |
            ${{ steps.repo.outputs.frontend_image }}:latest
            ${{ steps.repo.outputs.frontend_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_ACTOR,GH_TOKEN,BACKEND_IMAGE,FRONTEND_IMAGE,IMAGE_TAG
          script_stop: true
          script: |
            cd /opt/bipflow
            git fetch origin main
            git reset --hard origin/main
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          IMAGE_TAG: ${{ github.sha }}
