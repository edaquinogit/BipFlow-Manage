x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-bipflow}
  POSTGRES_USER: ${POSTGRES_USER:-bipflow}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bipflow_password}

x-backend-env: &backend-env
  DJANGO_ENV: production
  DJANGO_DEBUG: "False"
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-use-a-real-secret-key}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
  CSRF_TRUSTED_ORIGINS: ${DOCKER_CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
  CORS_ALLOWED_ORIGINS: ${DOCKER_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
  BASE_URL: ${DOCKER_PUBLIC_URL:-http://localhost:8080}
  FRONTEND_BASE_URL: ${DOCKER_PUBLIC_URL:-http://localhost:8080}
  DATABASE_URL: postgres://${POSTGRES_USER:-bipflow}:${POSTGRES_PASSWORD:-bipflow_password}@postgres:5432/${POSTGRES_DB:-bipflow}
  DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-60}
  CACHE_URL: redis://redis:6379/1
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@bipflow.local}
  WHATSAPP_ORDER_PHONE: ${WHATSAPP_ORDER_PHONE:-}
  ORDER_DELIVERY_FEE: ${ORDER_DELIVERY_FEE:-12.00}
  DJANGO_BOOTSTRAP_ADMIN_EMAIL: ${DJANGO_BOOTSTRAP_ADMIN_EMAIL:-}
  DJANGO_BOOTSTRAP_ADMIN_PASSWORD: ${DJANGO_BOOTSTRAP_ADMIN_PASSWORD:-}
  DJANGO_BOOTSTRAP_ADMIN_ROLE: ${DJANGO_BOOTSTRAP_ADMIN_ROLE:-admin}

services:
  postgres:
    image: postgres:16-alpine
    environment: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment: *backend-env
    volumes:
      - static_data:/app/bipdelivery/staticfiles
      - media_data:/app/bipdelivery/media
      - backend_logs:/app/bipdelivery/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/products/?page_size=1', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  backend_logs:
